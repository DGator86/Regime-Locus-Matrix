version: "3.9"

services:
  data-lake:
    image: minio/minio:RELEASE.2026-03-26T22-10-17Z
    container_name: rlm-data-lake
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rlm}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rlm-dev-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/lake:/data

  jupyter:
    image: jupyter/scipy-notebook:python-3.12
    container_name: rlm-jupyter
    working_dir: /workspace
    command: start-notebook.py --NotebookApp.token='${JUPYTER_TOKEN:-rlm}'
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      PYTHONPATH: /workspace/src
      MASSIVE_S3_ENDPOINT: http://data-lake:9000
      MASSIVE_S3_BUCKET: ${MASSIVE_S3_BUCKET:-rlm-dev}
      MASSIVE_S3_REGION: ${MASSIVE_S3_REGION:-us-east-1}
      MASSIVE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-rlm}
      MASSIVE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-rlm-dev-password}
      IBKR_HOST: ibkr-gateway
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: "7"
    ports:
      - "8888:8888"
    volumes:
      - ./:/workspace
      - ./data:/workspace/data
    depends_on:
      - data-lake
      - ibkr-gateway

  ibkr-gateway:
    image: voyz/ibeam:latest
    container_name: rlm-ibkr-gateway
    environment:
      IBEAM_ACCOUNT: ${IBKR_ACCOUNT:?Set IBKR_ACCOUNT in .env}
      IBEAM_PASSWORD: ${IBKR_PASSWORD:?Set IBKR_PASSWORD in .env}
      IBEAM_GATEWAY_BASE_URL: http://ibkr-gateway:5000
      IBEAM_TRADING_MODE: paper
      IBEAM_LOG_LEVEL: INFO
    ports:
      - "5000:5000"
      - "4002:4002"
    volumes:
      - ./data/ibkr:/srv/ibeam
