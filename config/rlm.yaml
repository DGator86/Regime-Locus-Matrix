hmm:
  n_states: 6
  covariance_type: full

lifecycle:
  force_close_dte: 1
  close_at_expiry_if_open: true
  # "liquidate_before_expiry" | "settle_at_expiry"
  expiry_liquidation_policy: liquidate_before_expiry
  max_holding_bars: null
  one_trade_per_bar: true

commission:
  # "per_contract" | "per_trade" | "hybrid"
  model: per_contract
  per_contract_rate: 0.65
  per_trade_rate: 0.0
  min_commission: 0.0
