# RLM live profile — conservative settings for live/paper trading

profile: live

regime:
  model: hmm
  hmm_states: 6

forecast:
  drift_gamma_alpha: 0.65
  move_window: 100
  vol_window: 100

kronos:
  enabled: true
  device: "cpu"
  regime_confidence_weight: 0.4

roee_hmm:
  use_dynamic_sizing: true
  max_kelly_fraction: 0.15       # tighter cap for live
  max_capital_fraction: 0.3      # more conservative live sizing
  vol_target: 0.12
  hmm_confidence_threshold: 0.65 # require higher confidence for live entries
  transition_penalty: 0.6        # penalize regime transitions harder

backtest:
  run_backtest: false
