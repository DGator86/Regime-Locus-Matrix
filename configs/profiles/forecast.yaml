# RLM forecast profile — tuned for clean signal generation, no backtest overhead

profile: forecast

regime:
  model: hmm
  hmm_states: 6

forecast:
  drift_gamma_alpha: 0.65
  move_window: 100
  vol_window: 100

kronos:
  enabled: true
  device: "cpu"
  regime_confidence_weight: 0.4

roee_hmm:
  use_dynamic_sizing: false
  max_kelly_fraction: 0.25

backtest:
  run_backtest: false
