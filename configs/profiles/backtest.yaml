# RLM backtest profile — full pipeline with backtest engine enabled

profile: backtest

regime:
  model: hmm
  hmm_states: 6

forecast:
  drift_gamma_alpha: 0.65
  move_window: 100
  vol_window: 100

kronos:
  enabled: true
  device: "cpu"

backtest:
  run_backtest: true
  initial_capital: 100000
  contract_multiplier: 100
  quantity_per_trade: 1
  strike_increment: 1.0

roee_hmm:
  use_dynamic_sizing: true
  max_kelly_fraction: 0.25
  vol_target: 0.15

walkforward:
  is_window: 100
  oos_window: 50
  step_size: 50
